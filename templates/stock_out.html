{% extends "base.html" %}

{% block title %}Stock Out - {{ item.display_name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Direct Stock Out</h1>
        <p class="text-gray-600 mb-6">Deducting stock for: <span class="font-semibold text-blue-600">{{ item.display_name }}</span></p>
        
        <form method="POST" class="space-y-4">
            {{ csrf_token() }}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Quantity to Deduct (Pieces)</label>
                <input type="number" name="quantity_pieces" step="0.01" min="0.01" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Notes / Receiver Name (Optional)</label>
                <textarea name="notes" rows="3" placeholder="e.g., Handed to Mr. Ahmed for Truck #123"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500"></textarea>
            </div>
            
            <div class="flex gap-3 pt-4">
                <a href="{{ url_for('stock.stock_directory') }}" 
                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-center hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit" 
                        class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                    Confirm Stock Out
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
